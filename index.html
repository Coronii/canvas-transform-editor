<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Transformation Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e12;
    --surface: #16161c;
    --panel: #1c1c24;
    --border: #2a2a38;
    --accent: #7c6dfa;
    --accent2: #fa6d8f;
    --accent3: #6dfacc;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --label-font: 'Space Mono', monospace;
    --body-font: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body-font);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  header h1 {
    font-family: var(--label-font);
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header-badge {
    font-family: var(--label-font);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .canvas-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(124,109,250,0.04) 0%, transparent 60%),
      radial-gradient(circle at 80% 80%, rgba(250,109,143,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  canvas {
    display: block;
    cursor: default;
    border: 1px solid var(--border);
    border-radius: 2px;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }

  canvas.dragging { cursor: grabbing; }

  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section {
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }

  .section-label {
    font-family: var(--label-font);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .shape-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .shape-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
    color: var(--muted);
  }

  .shape-btn:hover { border-color: var(--accent); color: var(--text); }
  .shape-btn.active { border-color: var(--accent); background: rgba(124,109,250,0.12); color: var(--accent); }

  .shape-btn canvas {
    border: none;
    box-shadow: none;
    border-radius: 0;
  }

  .shape-btn span {
    font-family: var(--label-font);
    font-size: 8px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .toggle-label {
    font-size: 13px;
    color: var(--text);
  }

  .toggle {
    width: 36px;
    height: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle.on { background: var(--accent); border-color: var(--accent); }

  .toggle-knob {
    position: absolute;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: transform 0.2s;
  }

  .toggle.on .toggle-knob { transform: translateX(16px); }

  .control-row {
    margin-bottom: 10px;
  }

  .control-row label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-family: var(--label-font);
  }

  .control-row label span {
    color: var(--accent3);
  }

  input[type=range] {
    width: 100%;
    height: 3px;
    -webkit-appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--panel);
  }

  input[type=range]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--panel);
  }

  input[type=color] {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    background: none;
    padding: 2px;
  }

  .xy-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }

  .num-input-wrap {
    position: relative;
  }

  .num-input-wrap label {
    position: absolute;
    top: 50%;
    left: 8px;
    transform: translateY(-50%);
    font-family: var(--label-font);
    font-size: 9px;
    color: var(--muted);
    pointer-events: none;
    z-index: 1;
  }

  .num-input-wrap input[type=number] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--label-font);
    font-size: 12px;
    padding: 6px 8px 6px 22px;
    outline: none;
    -moz-appearance: textfield;
  }

  .num-input-wrap input[type=number]::-webkit-inner-spin-button,
  .num-input-wrap input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .num-input-wrap input[type=number]:focus { border-color: var(--accent); }

  .subsection-label {
    font-family: var(--label-font);
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 2px;
  }

  .export-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #9d6dfa);
    border: none;
    border-radius: 6px;
    color: white;
    font-family: var(--label-font);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .export-btn:hover { opacity: 0.9; }
  .export-btn:active { transform: scale(0.98); }

  .color-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .color-row .toggle-label { flex: 1; font-size: 13px; }

  .fill-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 10px;
  }

  .fill-swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }

  .fill-swatch.active { border-color: white; }

  .drag-hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--label-font);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(22,22,28,0.7);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    white-space: nowrap;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <h1>Shape Transformation Explorer</h1>
  <span class="header-badge">Canvas API</span>
</header>

<div class="workspace">
  <div class="canvas-area" id="canvasArea">
    <canvas id="main" width="820" height="580"></canvas>
    <div class="drag-hint">drag original to translate · right-click to reset</div>
  </div>

  <div class="sidebar">

    <div class="section">
      <div class="section-label">Shape</div>
      <div class="shape-grid" id="shapeGrid"></div>
    </div>

    <div class="section">
      <div class="section-label">Fill Color</div>
      <div class="fill-grid" id="fillGrid"></div>
    </div>

    <div class="section">
      <div class="section-label">Outline</div>
      <div class="toggle-row">
        <span class="toggle-label">Stroke</span>
        <div class="toggle on" id="strokeToggle"><div class="toggle-knob"></div></div>
      </div>
      <div class="color-row">
        <span class="toggle-label" style="font-size:12px;color:var(--muted)">Color</span>
        <input type="color" id="strokeColor" value="#7c6dfa">
      </div>
      <div class="control-row">
        <label>Thickness <span id="thickVal">2</span>px</label>
        <input type="range" id="thickness" min="1" max="10" value="2">
      </div>
    </div>

    <div class="section">
      <div class="section-label">Transform</div>

      <div class="subsection-label">Translate</div>
      <div class="xy-row">
        <div class="num-input-wrap">
          <label>X</label>
          <input type="number" id="tx" value="180" min="-400" max="400">
        </div>
        <div class="num-input-wrap">
          <label>Y</label>
          <input type="number" id="ty" value="0" min="-300" max="300">
        </div>
      </div>

      <div class="subsection-label">Rotate</div>
      <div class="control-row">
        <label>Degrees <span id="rotVal">45</span>°</label>
        <input type="range" id="rotation" min="0" max="360" value="45">
      </div>

      <div class="subsection-label">Scale</div>
      <div class="control-row">
        <label>Factor <span id="scaleVal">1.6</span>×</label>
        <input type="range" id="scaleFactor" min="0.2" max="3" step="0.1" value="1.6">
      </div>
    </div>

    <div class="section">
      <div class="section-label">Export</div>
      <button class="export-btn" id="exportBtn">⬇ Download PNG</button>
    </div>

  </div>
</div>

<script>
const SHAPES = ['square','rectangle','circle','triangle','star','heart','semicircle'];
const FILL_COLORS = [
  '#7c6dfa','#fa6d8f','#6dfacc','#facc6d','#fa8c6d','#6db4fa','#d06dfa',
];

const state = {
  shape: 'star',
  fillColor: '#7c6dfa',
  stroke: true,
  strokeColor: '#ffffff',
  strokeWidth: 2,
  tx: 180,
  ty: 0,
  rotation: 45,
  scale: 1.6,
  dragging: false,
  dragStartX: 0,
  dragStartY: 0,
  origTx: 180,
  origTy: 0,
};

const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');

function drawShape(ctx, shape, size) {
  ctx.beginPath();
  switch(shape) {
    case 'square': {
      const s = size * 0.85;
      ctx.rect(-s/2, -s/2, s, s);
      break;
    }
    case 'rectangle': {
      const w = size * 1.4, h = size * 0.7;
      ctx.rect(-w/2, -h/2, w, h);
      break;
    }
    case 'circle':
      ctx.arc(0, 0, size * 0.5, 0, Math.PI * 2);
      break;
    case 'triangle': {
      const r = size * 0.55;
      ctx.moveTo(0, -r);
      ctx.lineTo(r * Math.cos(Math.PI/6), r * Math.sin(Math.PI/6));
      ctx.lineTo(-r * Math.cos(Math.PI/6), r * Math.sin(Math.PI/6));
      ctx.closePath();
      break;
    }
    case 'star': {
      const outerR = size * 0.5, innerR = size * 0.22, pts = 5;
      for(let i = 0; i < pts * 2; i++) {
        const ang = (Math.PI / pts) * i - Math.PI / 2;
        const r2 = i % 2 === 0 ? outerR : innerR;
        i === 0 ? ctx.moveTo(Math.cos(ang)*r2, Math.sin(ang)*r2)
                : ctx.lineTo(Math.cos(ang)*r2, Math.sin(ang)*r2);
      }
      ctx.closePath();
      break;
    }
    case 'heart': {
      const sc = size * 0.03;
      ctx.save();
      ctx.scale(sc, sc);
      ctx.moveTo(0, -3);
      ctx.bezierCurveTo(-10, -14, -20, -4, -10, 6);
      ctx.lineTo(0, 16);
      ctx.lineTo(10, 6);
      ctx.bezierCurveTo(20, -4, 10, -14, 0, -3);
      ctx.restore();
      ctx.closePath();
      break;
    }
    case 'semicircle': {
      const r3 = size * 0.5;
      ctx.arc(0, 0, r3, Math.PI, 0);
      ctx.lineTo(r3, r3 * 0.1);
      ctx.lineTo(-r3, r3 * 0.1);
      ctx.closePath();
      break;
    }
  }
}

function applyShapeStyle(ctx, fill, stroke, strokeColor, strokeWidth, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = fill;
  ctx.fill();
  if(stroke) {
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = strokeWidth;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawLabel(ctx, text, x, y, color='#888') {
  ctx.save();
  ctx.font = "bold 10px 'Space Mono', monospace";
  ctx.fillStyle = color;
  ctx.letterSpacing = '0.06em';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const w = ctx.measureText(text).width + 16;
  ctx.fillStyle = 'rgba(14,14,18,0.75)';
  ctx.beginPath();
  ctx.roundRect(x - w/2, y - 9, w, 18, 3);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawGrid(ctx, w, h) {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const step = 40;
  for(let x2 = 0; x2 <= w; x2 += step) {
    ctx.beginPath(); ctx.moveTo(x2, 0); ctx.lineTo(x2, h); ctx.stroke();
  }
  for(let y2 = 0; y2 <= h; y2 += step) {
    ctx.beginPath(); ctx.moveTo(0, y2); ctx.lineTo(w, y2); ctx.stroke();
  }
  ctx.restore();
}

const BASE_SIZE = 72;

function getOrigCenter() {
  return { x: 130, y: canvas.height / 2 };
}

function render() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#0e0e12';
  ctx.fillRect(0, 0, W, H);
  drawGrid(ctx, W, H);

  const orig = getOrigCenter();
  const S = state;

  const panelY = H / 2;
  const panelSpacing = (W - 60) / 4;
  const centers = [
    { x: 60 + panelSpacing * 0, y: panelY, label: 'ORIGINAL', tag: 'base' },
    { x: 60 + panelSpacing * 1, y: panelY, label: 'TRANSLATED', tag: 'translated' },
    { x: 60 + panelSpacing * 2, y: panelY, label: 'ROTATED', tag: 'rotated' },
    { x: 60 + panelSpacing * 3, y: panelY, label: 'SCALED', tag: 'scaled' },
  ];

  const colW = panelSpacing;
  const colH = H - 40;
  centers.forEach((c, i) => {
    ctx.save();
    ctx.strokeStyle = i === 0 ? 'rgba(124,109,250,0.12)' : 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(c.x - colW/2, 20, colW, colH);
    ctx.setLineDash([]);
    ctx.restore();
  });

  const tagColors = {
    base: '#7c6dfa',
    translated: '#6dfacc',
    rotated: '#fa6d8f',
    scaled: '#facc6d',
  };

  // ─── ORIGINAL ─────────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(centers[0].x, centers[0].y);
  drawShape(ctx, S.shape, BASE_SIZE);
  applyShapeStyle(ctx, S.fillColor, S.stroke, S.strokeColor, S.strokeWidth);
  // origin dot
  ctx.beginPath();
  ctx.arc(0, 0, 3, 0, Math.PI*2);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.restore();

  // Arrow guides
  function drawArrow(x1, y1, x2, y2, color) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.4;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const len = 7;
    ctx.beginPath();
    ctx.globalAlpha = 0.7;
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - len * Math.cos(angle - 0.4), y2 - len * Math.sin(angle - 0.4));
    ctx.lineTo(x2 - len * Math.cos(angle + 0.4), y2 - len * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ─── TRANSLATED ───────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(centers[1].x, centers[1].y);
  // show ghost at origin
  drawShape(ctx, S.shape, BASE_SIZE);
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = S.fillColor;
  ctx.fill();
  if(S.stroke) { ctx.strokeStyle = S.strokeColor; ctx.lineWidth = S.strokeWidth; ctx.stroke(); }
  ctx.globalAlpha = 1;
  // translate
  ctx.translate(S.tx * 0.45, S.ty * 0.45);
  drawShape(ctx, S.shape, BASE_SIZE);
  applyShapeStyle(ctx, S.fillColor, S.stroke, S.strokeColor, S.strokeWidth);
  ctx.restore();

  drawArrow(
    centers[1].x, centers[1].y,
    centers[1].x + S.tx * 0.45, centers[1].y + S.ty * 0.45,
    tagColors.translated
  );

  // ─── ROTATED ──────────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(centers[2].x, centers[2].y);
  // ghost
  drawShape(ctx, S.shape, BASE_SIZE);
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = S.fillColor;
  ctx.fill();
  if(S.stroke) { ctx.strokeStyle = S.strokeColor; ctx.lineWidth = S.strokeWidth; ctx.stroke(); }
  ctx.globalAlpha = 1;
  ctx.rotate(S.rotation * Math.PI / 180);
  drawShape(ctx, S.shape, BASE_SIZE);
  applyShapeStyle(ctx, S.fillColor, S.stroke, S.strokeColor, S.strokeWidth);
  // rotation arc
  ctx.save();
  ctx.strokeStyle = tagColors.rotated;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.4;
  ctx.setLineDash([3,3]);
  ctx.beginPath();
  ctx.arc(0, 0, BASE_SIZE * 0.65, -Math.PI/2, (S.rotation - 90) * Math.PI/180);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
  ctx.restore();

  // ─── SCALED ──────────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(centers[3].x, centers[3].y);
  // ghost at original size
  drawShape(ctx, S.shape, BASE_SIZE);
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = S.fillColor;
  ctx.fill();
  if(S.stroke) { ctx.strokeStyle = S.strokeColor; ctx.lineWidth = S.strokeWidth; ctx.stroke(); }
  ctx.globalAlpha = 1;
  ctx.scale(S.scale, S.scale);
  drawShape(ctx, S.shape, BASE_SIZE);
  applyShapeStyle(ctx, S.fillColor, S.stroke, S.strokeColor, S.strokeWidth);
  ctx.restore();

  // ─── LABELS ──────────────────────────────────────────────────────────
  const labelY = H - 22;
  centers.forEach((c, i) => {
    const color = Object.values(tagColors)[i];
    drawLabel(ctx, c.label, c.x, labelY, color);
  });

  // Sub-labels with param values
  ctx.save();
  ctx.font = "9px 'Space Mono', monospace";
  ctx.textAlign = 'center';

  ctx.fillStyle = tagColors.base;
  ctx.fillText('size: 1×', centers[0].x, labelY + 14);

  ctx.fillStyle = tagColors.translated;
  ctx.fillText(`tx:${S.tx} ty:${S.ty}`, centers[1].x, labelY + 14);

  ctx.fillStyle = tagColors.rotated;
  ctx.fillText(`${S.rotation}°`, centers[2].x, labelY + 14);

  ctx.fillStyle = tagColors.scaled;
  ctx.fillText(`${S.scale.toFixed(1)}×`, centers[3].x, labelY + 14);

  ctx.restore();

  // ─── COLUMN HEADERS ──────────────────────────────────────────────────
  const headerY = 30;
  const transforms = [
    { label: 'ctx.translate(0, 0)', color: tagColors.base },
    { label: `ctx.translate(${S.tx}, ${S.ty})`, color: tagColors.translated },
    { label: `ctx.rotate(${S.rotation}°)`, color: tagColors.rotated },
    { label: `ctx.scale(${S.scale.toFixed(1)}, ${S.scale.toFixed(1)})`, color: tagColors.scaled },
  ];

  ctx.font = "8px 'Space Mono', monospace";
  ctx.textAlign = 'center';
  transforms.forEach((t, i) => {
    ctx.fillStyle = t.color;
    ctx.globalAlpha = 0.6;
    ctx.fillText(t.label, centers[i].x, headerY);
  });
  ctx.globalAlpha = 1;
}

function buildShapeGrid() {
  const grid = document.getElementById('shapeGrid');
  SHAPES.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'shape-btn' + (name === state.shape ? ' active' : '');
    btn.dataset.shape = name;

    const mini = document.createElement('canvas');
    mini.width = 36; mini.height = 36;
    mini.style.cssText = 'border:none;box-shadow:none;border-radius:0;background:transparent;';
    const mc = mini.getContext('2d');
    mc.translate(18, 18);
    drawShape(mc, name, 36);
    mc.fillStyle = '#7c6dfa';
    mc.fill();

    const lbl = document.createElement('span');
    lbl.textContent = name;

    btn.appendChild(mini);
    btn.appendChild(lbl);
    btn.addEventListener('click', () => {
      state.shape = name;
      document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
    grid.appendChild(btn);
  });
}

function buildFillGrid() {
  const grid = document.getElementById('fillGrid');
  FILL_COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'fill-swatch' + (c === state.fillColor ? ' active' : '');
    sw.style.background = c;
    sw.addEventListener('click', () => {
      state.fillColor = c;
      document.querySelectorAll('.fill-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      render();
    });
    grid.appendChild(sw);
  });
}

function bindControls() {
  document.getElementById('strokeToggle').addEventListener('click', function() {
    state.stroke = !state.stroke;
    this.classList.toggle('on', state.stroke);
    render();
  });

  document.getElementById('strokeColor').addEventListener('input', e => {
    state.strokeColor = e.target.value;
    render();
  });

  const thick = document.getElementById('thickness');
  thick.addEventListener('input', e => {
    state.strokeWidth = +e.target.value;
    document.getElementById('thickVal').textContent = e.target.value;
    render();
  });

  const tx = document.getElementById('tx');
  const ty = document.getElementById('ty');
  tx.addEventListener('input', e => { state.tx = +e.target.value; render(); });
  ty.addEventListener('input', e => { state.ty = +e.target.value; render(); });

  const rot = document.getElementById('rotation');
  rot.addEventListener('input', e => {
    state.rotation = +e.target.value;
    document.getElementById('rotVal').textContent = e.target.value;
    render();
  });

  const sc = document.getElementById('scaleFactor');
  sc.addEventListener('input', e => {
    state.scale = +e.target.value;
    document.getElementById('scaleVal').textContent = (+e.target.value).toFixed(1);
    render();
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'shape-transformation-explorer.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

function hitTestOriginal(mx, my) {
  const c = getOrigCenter();
  const d = BASE_SIZE * 0.6;
  return mx >= c.x - d && mx <= c.x + d && my >= c.y - d && my <= c.y + d;
}

function bindDrag() {
  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    if(hitTestOriginal(mx, my)) {
      state.dragging = true;
      state.dragStartX = mx;
      state.dragStartY = my;
      state.origTx = state.tx;
      state.origTy = state.ty;
      canvas.classList.add('dragging');
    }
  });

  window.addEventListener('mousemove', e => {
    if(!state.dragging) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const dx = Math.round(mx - state.dragStartX);
    const dy = Math.round(my - state.dragStartY);
    state.tx = Math.max(-400, Math.min(400, state.origTx + dx));
    state.ty = Math.max(-300, Math.min(300, state.origTy + dy));
    document.getElementById('tx').value = state.tx;
    document.getElementById('ty').value = state.ty;
    render();
  });

  window.addEventListener('mouseup', () => {
    if(state.dragging) {
      state.dragging = false;
      canvas.classList.remove('dragging');
    }
  });

  canvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    state.tx = 180; state.ty = 0;
    document.getElementById('tx').value = 180;
    document.getElementById('ty').value = 0;
    render();
  });

  canvas.addEventListener('mousemove', e => {
    if(state.dragging) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    canvas.style.cursor = hitTestOriginal(mx, my) ? 'grab' : 'default';
  });
}

buildShapeGrid();
buildFillGrid();
bindControls();
bindDrag();
render();
</script>
</body>
</html>
